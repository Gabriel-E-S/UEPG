<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande formulário</title>
</head>
<body>
    <h1>Formulário</h1>

    <p>Preencha com atenção:</p>

    <form action="processa.php" method="post">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">

        <br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email">

        <br>

        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone">

        <br>

        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" name="nascimento" id="nascimento">

        <br>

        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco">

        <br>

        <label for="cidade">Cidade:</label>
        <input type="text" name="cidade" id="cidade">

        <br>

        <label for="estado">Escolha seu Estado:</label>
        <select name="estado" id="estado">
            <option value="AC">AC</option>
            <option value="AL">AL</option>
            <option value="AP">AP</option>
            <option value="AM">AM</option>
            <option value="BA">BA</option>
            <option value="CE">CE</option>
            <option value="DF">DF</option>
            <option value="ES">ES</option>
            <option value="GO">GO</option>
            <option value="MA">MA</option>
            <option value="MT">MT</option>
            <option value="MS">MS</option>
            <option value="MG">MG</option>
            <option value="PA">PA</option>
            <option value="PB">PB</option>
            <option value="PR">PR</option>
            <option value="PE">PE</option>
            <option value="PI">PI</option>
            <option value="RJ">RJ</option>
            <option value="RN">RN</option>
            <option value="RS">RS</option>
            <option value="RO">RO</option>
            <option value="RR">RR</option>
            <option value="SC">SC</option>
            <option value="SP">SP</option>
            <option value="SE">SE</option>
            <option value="TO">TO</option>
    </select>

    <br>

    <label for="cor">Escolha sua cor favorita:</label>
    <input type="color" name="cor" id="cor">

    <br>

    <label for="areaInteresse">Escolha sua área de interesse:</label>

    <input type="checkbox" name="frontEnd" id="frontEnd" value="sim">
    <label for="frontEnd">FrontEnd</label>

    <input type="checkbox" name="backEnd" id="backEnd" value="sim">
    <label for="backEnd">BackEnd</label>

    <input type="checkbox" name="bancoDeDados" id="bancoDeDados" value="sim">
    <label for="bancoDeDados">Banco de Dados</label>

    <br>

    <label for="turno">Qual seu turno de trabalho preferido?</label>

    <input type="radio" name="turno" id="manha" value="manha">
    <label for="manha">Manhã</label>

    <input type="radio" name="turno" id="tarde" value="tarde">
    <label for="tarde">Tarde</label>

    <input type="radio" name="turno" id="noite" value="noite">
    <label for="noite">Noite</label>

    <br>

    <label for="mensagem">Digite uma mensagem:</label>
    <textarea name="mensagem" id="mensagem"></textarea>

    <br>    

    <button type="submit">Enviar</button>

    <button type="reset">reset</button>

    </form>
</body>
</html>
