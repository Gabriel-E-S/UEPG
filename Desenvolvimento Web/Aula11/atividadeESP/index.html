<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade ESP-8266</title>

    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <h1>Tradutor Código Morse</h1>

    <div class="container">
        <h2>Insira a palavra que deseja traduzir:</h2>
        <input type="text" id="entradaPalavra" placeholder="Digite a palavra aqui:" required max="50" min="1"><br>

        <button id = "enviarPalavra">
            Enviar
        </button>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
