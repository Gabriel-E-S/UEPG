<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Marker</title>

    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <header>
        <h1>Book Marker</h1>
        <p>Seu site de acompanhamento de livros e leitura.</p>
    </header>

    <div class="inputNovoLivro">
        <input type="text" id="inputTituloLivro" placeholder="Digite o título do livro">
        <button id="botaoAdicionar">Adicionar</button>
    </div>

    <div class="quadros">
        <div class="coluna" id="queroLer">
            <h2>Quero Ler</h2>
        </div>
        <div class="coluna" id="lendo">
            <h2>Lendo</h2>
        </div>
        <div class="coluna" id="lido">
            <h2>Lido</h2>
        </div>
    </div>

    <script src="./scripts/script.js"></script>
</body>
</html>
